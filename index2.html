<!DOCTYPE html>
<html lang="pt-BR" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Pen Hero - Design System</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Iconify -->
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    
    <!-- GSAP / ScrollTrigger / Lenis -->
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.34/dist/lenis.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <!-- SplitType -->
    <script src="https://unpkg.com/split-type"></script>

    <style>
        :root {
            --bg-light: #EAEAE5;
            --bg-inverted: #0a0a0a;
            --text-dark: #1C1C1C;
            --text-light: #EAEAE5;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-light);
            color: var(--text-dark);
            margin: 0;
            overflow-x: hidden;
            /* Hide scrollbar for a cleaner look */
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        body::-webkit-scrollbar {
            display: none;
        }

        /* Lenis smooth scrolling reset */
        html.lenis {
            height: auto;
        }
        .lenis.lenis-smooth {
            scroll-behavior: auto;
        }

        /* Design System Utilities */
        .glass-badge {
            background: rgba(26, 26, 26, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0,0,0,0.05);
        }

        /* Shimmer Button */
        @keyframes shimmer {
            0% { transform: translateX(-100%) skewX(-15deg); }
            100% { transform: translateX(200%) skewX(-15deg); }
        }
        @keyframes spin { 100% { transform: translate(-50%, -50%) rotate(360deg); } }

        .shimmer-btn-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-flex;
            border-radius: 9999px;
            padding: 2px;
            background: rgba(0,0,0,0.05);
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .shimmer-btn-wrapper:hover {
            transform: scale(1.02);
        }
        .shimmer-btn-wrapper::before {
            content: "";
            position: absolute;
            top: 50%; left: 50%; width: 300%; height: 300%;
            background: conic-gradient(from 0deg, transparent 0 340deg, #1C1C1C 360deg);
            transform: translate(-50%, -50%);
            animation: spin 2.5s linear infinite;
        }
        .shimmer-btn {
            position: relative;
            z-index: 10;
            background: var(--bg-light);
            color: var(--text-dark);
            border-radius: 9999px;
            padding: 1rem 2.5rem;
            font-weight: 500;
            overflow: hidden;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .shimmer-btn::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.8), transparent);
            transform: translateX(-100%) skewX(-15deg);
            opacity: 0; transition: opacity 0.3s;
        }
        .shimmer-btn-wrapper:hover .shimmer-btn::after {
            opacity: 1; animation: shimmer 1.5s infinite;
        }

        /* Secondary Button */
        .btn-secondary {
            position: relative;
            padding: 1rem 2.5rem;
            border-radius: 9999px;
            border: 1px solid rgba(28, 28, 28, 0.2);
            font-weight: 500;
            overflow: hidden;
            transition: all 0.4s ease;
        }
        .btn-secondary::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--text-dark);
            transform: scaleX(0);
            transform-origin: right;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: -1;
        }
        .btn-secondary:hover {
            color: var(--bg-light);
            border-color: var(--text-dark);
        }
        .btn-secondary:hover::before {
            transform: scaleX(1);
            transform-origin: left;
        }

        /* Typography split animation classes */
        .char {
            transform: translateY(115%);
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Cinematic Overlay */
        .cinematic-overlay {
            background: linear-gradient(to right, rgba(234, 234, 229, 0.9) 0%, rgba(234, 234, 229, 0.4) 50%, rgba(234, 234, 229, 0) 100%);
        }

        video {
            object-fit: cover;
            width: 100%;
            height: 100%;
        }

        #hero-section {
            height: 300vh; /* Adds scroll length for the video scrub effect */
        }
    </style>
</head>
<body class="antialiased selection:bg-stone-300 selection:text-stone-900">

    <!-- Scrollable container -->
    <main id="hero-section" class="relative w-full">
        <!-- Sticky content wrapper -->
        <div id="sticky-container" class="sticky top-0 h-screen w-full flex flex-col md:flex-row overflow-hidden">
            
            <!-- LEFT: Content -->
            <div class="w-full md:w-5/12 h-full relative z-20 flex flex-col justify-center px-8 sm:px-16 md:px-24 cinematic-overlay backdrop-blur-sm">
                
                <div class="content-wrapper flex flex-col gap-6 max-w-lg">
                    <span class="eyebrow glass-badge px-4 py-2 rounded-full text-xs font-mono uppercase tracking-widest text-stone-600 self-start shadow-sm opacity-0 translate-y-4">
                        Aura Collection
                    </span>

                    <h1 class="headline text-6xl md:text-7xl lg:text-[5.5rem] font-semibold tracking-tighter leading-[1.05] text-stone-900 overflow-hidden">
                        A arte de 
                        <br/>
                        escrever.
                    </h1>

                    <p class="subheadline text-lg md:text-xl text-stone-600 font-light leading-relaxed mt-4 opacity-0">
                        Design impecável. Balanceado milimetricamente. Feita para mentes que transformam ideias em legado.
                    </p>

                    <div class="cta-group flex flex-col sm:flex-row items-center gap-6 mt-8 opacity-0 translate-y-4">
                        <div class="shimmer-btn-wrapper shadow-xl w-full sm:w-auto">
                            <button class="shimmer-btn w-full justify-center">
                                Comprar Agora <iconify-icon icon="solar:arrow-right-line-duotone" class="text-xl"></iconify-icon>
                            </button>
                        </div>
                        <a href="#" class="btn-secondary w-full sm:w-auto text-center">
                            Ver detalhes
                        </a>
                    </div>
                </div>

                <!-- Scroll Indicator -->
                <div class="absolute bottom-12 left-8 md:left-24 flex items-center gap-3 opacity-0 scroll-indicator">
                    <span class="text-xs font-mono tracking-widest uppercase text-stone-400">Scroll</span>
                    <div class="w-12 h-[1px] bg-stone-300 relative overflow-hidden">
                        <div class="absolute top-0 left-0 w-full h-full bg-stone-900 -translate-x-full animate-[shimmer_2s_infinite]"></div>
                    </div>
                </div>
            </div>

            <!-- RIGHT: Media (Video) -->
            <div class="absolute inset-0 md:relative md:inset-auto md:w-7/12 h-full z-10 bg-[#EAEAE5] overflow-hidden flex items-center justify-center">
                <!-- Video Scrub Container -->
                <div class="w-full h-full scale-105" id="video-container">
                    <!-- Path referencing the user's video exactly -->
                    <video 
                        id="product-video" 
                        src="./Meus design system/a-seamless-looping-cinematic-product-video-of-a-pr.mp4" 
                        muted 
                        playsinline 
                        preload="metadata"
                        class="opacity-0 filter contrast-110 saturate-50"
                    ></video>
                </div>
                
                <!-- Subtle Gradient right to left to blend with background -->
                <div class="absolute inset-y-0 left-0 w-32 bg-gradient-to-r from-[--bg-light] to-transparent z-20 hidden md:block"></div>
                
                <!-- Visual Noise Overlay -->
                <div class="absolute inset-0 opacity-[0.03] z-20 pointer-events-none" style="background-image: url('data:image/svg+xml,%3Csvg viewBox=%220 0 200 200%22 xmlns=%22http://www.w3.org/2000/svg%22%3E%3Cfilter id=%22noiseFilter%22%3E%3CfeTurbulence type=%22fractalNoise%22 baseFrequency=%220.65%22 numOctaves=%223%22 stitchTiles=%22stitch%22/%3E%3C/filter%3E%3Crect width=%22100%25%22 height=%22100%25%22 filter=%22url(%23noiseFilter)%22/%3E%3C/svg%3E');"></div>
            </div>
            
        </div>
    </main>

    <!-- Content below hero just to verify scroll ending -->
    <section class="min-h-screen bg-stone-900 text-white flex items-center justify-center relative z-30">
        <h2 class="text-4xl md:text-6xl tracking-tighter font-medium">Precisão Absoluta.</h2>
    </section>

    <script>
        gsap.registerPlugin(ScrollTrigger);

        // 1. Initialize Lenis (Smooth Scroll - Apple-like fluid feel)
        const lenis = new Lenis({
            duration: 1.2,
            easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)), 
            direction: 'vertical',
            gestureDirection: 'vertical',
            smooth: true,
            mouseMultiplier: 1,
            smoothTouch: false,
            touchMultiplier: 2,
            infinite: false,
        })

        // Hook Lenis up to ScrollTrigger
        lenis.on('scroll', ScrollTrigger.update)

        gsap.ticker.add((time)=>{
            lenis.raf(time * 1000)
        })
        gsap.ticker.lagSmoothing(0)

        // 2. Initial Entrance Animations
        const initEntrance = () => {
            // Split Text for headline
            const splitHeadline = new SplitType('.headline', { types: 'lines, words, chars' });
            
            // Initial element states
            gsap.set('.headline .char', { y: '115%', opacity: 0 });
            gsap.set('#product-video', { opacity: 0, scale: 1.1, filter: 'blur(10px) contrast(110%) saturate(50%)' });
            
            const tl = gsap.timeline({ defaults: { ease: 'power4.out' }});

            // Video fade in and scale down slightly
            tl.to('#product-video', {
                opacity: 1,
                scale: 1,
                filter: 'blur(0px) contrast(110%) saturate(50%)',
                duration: 2.5
            }, 0.2)
            
            // Eyebrow badge
            .to('.eyebrow', {
                opacity: 1, y: 0, duration: 1
            }, 0.5)

            // Headline chars
            .to('.headline .char', {
                y: '0%',
                opacity: 1,
                stagger: 0.015,
                duration: 1.2,
                ease: "expo.out"
            }, 0.7)

            // Subheadline
            .to('.subheadline', {
                opacity: 1,
                duration: 1.5
            }, 1.2)

            // CTA Buttons
            .to('.cta-group', {
                opacity: 1,
                y: 0,
                duration: 1
            }, 1.4)

            // Scroll indicator
            .to('.scroll-indicator', {
                opacity: 1,
                duration: 1
            }, 1.8);
        };

        // 3. Setup Video Scroll behavior (Scrub)
        const setupVideoScrub = () => {
            const video = document.getElementById('product-video');
            
            // When metadata is loaded, we know the video duration
            video.onloadedmetadata = function() {
                // Ensure video is paused
                video.pause();
                
                // Define scrub timeline
                let videoTl = gsap.timeline({
                    scrollTrigger: {
                        trigger: "#hero-section",
                        start: "top top",
                        end: "bottom bottom",
                        scrub: 1.5, // 1.5 seconds delay to smooth out the scrub (Apple-like feel)
                    }
                });

                // Animate video current time from 0 to its full duration
                videoTl.fromTo(video, 
                    { currentTime: 0 }, 
                    { 
                        currentTime: video.duration || 5, // fallback if duration isn't instantly available
                        ease: "none" 
                    }, 0
                );

                // Add parallax to left text based on scroll
                gsap.to('.content-wrapper', {
                    yPercent: 30,
                    opacity: 0,
                    ease: "none",
                    scrollTrigger: {
                        trigger: "#hero-section",
                        start: "top top",
                        end: "center top",
                        scrub: true
                    }
                });
            };

            // Force load to ensure metadata gets loaded
            video.load();
        };

        // Initialize on load
        window.addEventListener('load', () => {
            initEntrance();
            setupVideoScrub();
        });

    </script>
</body>
</html>
